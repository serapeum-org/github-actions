[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "serapeum-pypi-test-pkg-beta"
version = "0.1.0"
description = "Beta sub-package for PyPI release action workspace tests"
requires-python = ">=3.10"
dependencies = []

[tool.hatch.build.targets.wheel]
packages = ["src/serapeum_pypi_test_pkg_beta"]

[tool.hatch.build.targets.sdist]
include = ["src/", "pyproject.toml"]

  test-release-recovery-no-duplicates:
    name: Test release - recovery path no duplicates (issue #4)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Copy test fixture
        run: |
          cp tests/data/release-github/test-basic-uv/pyproject.toml .
          cp tests/data/release-github/test-basic-uv/uv.lock .

      - name: Clean up repository tags
        run: git tag -l | xargs -r git tag -d

      - name: Setup fake git remote for testing
        uses: ./.github/workflows/test-helpers/setup-fake-remote

      - name: Set up Python environment
        uses: serapeum-org/github-actions/actions/python-setup/uv@uv/v1
        with:
          python-version: '3.12'
          install-groups: 'groups: dev docs'

      - name: Create repo with commits for bump
        run: |
          git config user.name "Test Bot"
          git config user.email "test@example.com"

          # Create initial CHANGELOG.md
          cat > CHANGELOG.md << 'EOF'
          # Changelog

          All notable changes to this project will be documented in this file.
          EOF

          git add pyproject.toml CHANGELOG.md
          git commit -m "chore: initial commit"
          git tag 0.1.0
          git push origin main
          git push origin 0.1.0

          # Create feature commits
          echo "feature-a" > feature_a.py
          git add feature_a.py
          git commit -m "feat: add feature A for testing"

          echo "feature-b" > feature_b.py
          git add feature_b.py
          git commit -m "feat: add feature B for testing"

          echo "bugfix" > bugfix.py
          git add bugfix.py
          git commit -m "fix: resolve bug in processing"

          git push origin main

      - name: Simulate failed cz bump with partial changelog write
        run: |
          echo "=== Simulating partial changelog write from failed cz bump ==="

          # Calculate next version (same as the action does)
          NEXT_VERSION=$(uv run cz bump --dry-run --yes --increment minor | grep "tag to create" | awk '{print $NF}')
          echo "Next version: $NEXT_VERSION"

          # Simulate what happens when update_changelog_on_bump = true and
          # cz bump fails AFTER writing changelog but BEFORE completing:
          # The changelog gets new entries written to it.
          uv run cz changelog --incremental --unreleased-version="$NEXT_VERSION"

          echo ""
          echo "=== Changelog after partial write (simulating failed bump) ==="
          cat CHANGELOG.md

      - name: Run recovery path (the fix from issue #4)
        run: |
          echo "=== Running recovery path ==="

          # Read changelog_file from commitizen config (same as action does)
          CHANGELOG_FILE=$(grep -A 20 "^\[tool\.commitizen\]" pyproject.toml | grep "^changelog_file" | head -1 | sed 's/.*=\s*"\(.*\)"/\1/' || true)
          if [ -z "$CHANGELOG_FILE" ]; then
            CHANGELOG_FILE="CHANGELOG.md"
          fi
          echo "Changelog file: $CHANGELOG_FILE"

          NEXT_VERSION=$(uv run cz bump --dry-run --yes --increment minor | grep "tag to create" | awk '{print $NF}')

          # THE FIX: Reset changelog to pre-bump state
          git checkout -- "$CHANGELOG_FILE"
          echo "✓ Changelog reset to pre-bump state"

          # Regenerate full changelog
          uv run cz changelog --unreleased-version="$NEXT_VERSION"
          echo "✓ Changelog regenerated"

          # Bump version (files only, skip tag/commit)
          uv run cz bump --yes --increment minor --files-only
          echo "✓ Version bumped (files-only)"

          echo ""
          echo "=== Changelog after recovery ==="
          cat CHANGELOG.md

      - name: Verify no duplicate changelog entries
        run: |
          echo "=== Checking for duplicate entries ==="

          # Extract only feat/fix lines (the substantive changelog entries)
          ENTRIES=$(grep -E '^\s*-\s+' CHANGELOG.md | sed 's/^[[:space:]]*//' | sort)
          UNIQUE_ENTRIES=$(echo "$ENTRIES" | sort -u)

          echo "All entries:"
          echo "$ENTRIES"
          echo ""
          echo "Unique entries:"
          echo "$UNIQUE_ENTRIES"

          TOTAL=$(echo "$ENTRIES" | wc -l)
          UNIQUE=$(echo "$UNIQUE_ENTRIES" | wc -l)

          if [ "$TOTAL" -ne "$UNIQUE" ]; then
            echo ""
            echo "[ERROR] Found duplicate changelog entries!"
            echo "Total entries: $TOTAL, Unique entries: $UNIQUE"
            echo ""
            echo "Duplicates:"
            echo "$ENTRIES" | sort | uniq -d
            exit 1
          else
            echo ""
            echo "[OK] No duplicate changelog entries found ($TOTAL entries, all unique)"
          fi

      - name: Verify version was bumped correctly
        run: |
          NEW_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "//;s/"//')
          echo "New version: $NEW_VERSION"
          if [ "$NEW_VERSION" = "0.2.0" ]; then
            echo "[OK] Version bumped to 0.2.0"
          else
            echo "[ERROR] Expected 0.2.0, got: $NEW_VERSION"
            exit 1
          fi

  # Test that release notes are extracted from changelog, not auto-generated (issue #3)
  test-release-notes-from-changelog:
    name: Test release - release notes scoped to current version (issue #3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Copy test fixture
        run: |
          cp tests/data/release-github/test-basic-uv/pyproject.toml .
          cp tests/data/release-github/test-basic-uv/uv.lock .

      - name: Clean up repository tags
        run: git tag -l | xargs -r git tag -d

      - name: Setup fake git remote for testing
        uses: ./.github/workflows/test-helpers/setup-fake-remote

      - name: Set up Python environment
        uses: serapeum-org/github-actions/actions/python-setup/uv@uv/v1
        with:
          python-version: '3.12'
          install-groups: 'groups: dev docs'

      - name: Create repo with two releases worth of commits
        run: |
          git config user.name "Test Bot"
          git config user.email "test@example.com"

          # Create initial CHANGELOG.md
          cat > CHANGELOG.md << 'EOF'
          # Changelog

          All notable changes to this project will be documented in this file.
          EOF

          git add pyproject.toml CHANGELOG.md
          git commit -m "chore: initial commit"
          git tag 0.1.0
          git push origin main
          git push origin 0.1.0

          # First release commits (will become 0.2.0)
          echo "old-feature" > old_feature.py
          git add old_feature.py
          git commit -m "feat: add old feature from first release"

          git push origin main

          # Bump to 0.2.0
          uv run cz bump --yes --increment minor
          git push origin main --tags

          # Second release commits (will become 0.3.0)
          echo "new-feature" > new_feature.py
          git add new_feature.py
          git commit -m "feat: add new feature for second release"

          echo "bugfix" > bugfix.py
          git add bugfix.py
          git commit -m "fix: resolve critical bug"

          git push origin main

      - name: Extract release notes using the same logic as the action
        id: extract
        run: |
          # Calculate next version
          NEXT_VERSION=$(uv run cz bump --dry-run --yes --increment minor | grep "tag to create" | awk '{print $NF}')
          echo "Next version: $NEXT_VERSION"

          # Bump and generate changelog
          uv run cz bump --yes --increment minor

          # Read changelog file path
          CHANGELOG_FILE=$(grep -A 20 "^\[tool\.commitizen\]" pyproject.toml | grep "^changelog_file" | head -1 | sed 's/.*=\s*"\(.*\)"/\1/' || true)
          if [ -z "$CHANGELOG_FILE" ]; then
            CHANGELOG_FILE="CHANGELOG.md"
          fi

          echo "=== Full CHANGELOG.md ==="
          cat "$CHANGELOG_FILE"
          echo ""

          # Extract notes for current version only (same awk as the action)
          ESCAPED_VERSION=$(echo "$NEXT_VERSION" | sed 's/\./\\./g')
          BODY=$(awk "
            /^## .*${ESCAPED_VERSION}/ { found=1; next }
            found && /^## / { exit }
            found { print }
          " "$CHANGELOG_FILE")

          echo "=== Extracted release notes for $NEXT_VERSION ==="
          echo "$BODY"

          echo "body<<RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT

      - name: Verify release notes only contain current version changes
        run: |
          BODY="${{ steps.extract.outputs.body }}"
          VERSION="${{ steps.extract.outputs.version }}"

          echo "Checking release notes for version $VERSION"
          echo "---"
          echo "$BODY"
          echo "---"

          # Must contain the new commits
          if echo "$BODY" | grep -q "add new feature for second release"; then
            echo "[OK] Contains 'add new feature for second release'"
          else
            echo "[ERROR] Missing commit from current release"
            exit 1
          fi

          if echo "$BODY" | grep -q "resolve critical bug"; then
            echo "[OK] Contains 'resolve critical bug'"
          else
            echo "[ERROR] Missing commit from current release"
            exit 1
          fi

          # Must NOT contain commits from the previous release
          if echo "$BODY" | grep -q "old feature from first release"; then
            echo "[ERROR] Release notes contain commits from previous release (0.2.0)"
            echo "This is the bug from issue #3 — wrong comparison range"
            exit 1
          else
            echo "[OK] Does NOT contain commits from previous release"
          fi

          echo ""
          echo "[OK] Release notes are correctly scoped to version $VERSION only"

  # Test release notes extraction with custom changelog_file path

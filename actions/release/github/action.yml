name: 'GitHub Release'
description: 'Create a GitHub release with optional package manager setup for building/testing'

inputs:
  github-token:
    description: |
      GitHub token for creating releases. Typically use the built-in GITHUB_TOKEN or a personal access token.
      Example: secrets.GITHUB_TOKEN
    required: true
  increment:
    description: |
      Version increment type used by commitizen for semantic versioning.
      - patch: Bug fixes (1.0.0 -> 1.0.1)
      - minor: New features (1.0.1 -> 1.1.0)
      - major: Breaking changes (1.1.0 -> 2.0.0)
    required: false
    type: choice
    options:
      - patch
      - minor
      - major
    default: 'patch'
  prerelease-type:
    description: |
      Prerelease type appended to the version (used with commitizen --prerelease flag).
      - none: Standard release (1.0.0)
      - alpha: Alpha release (1.0.0-alpha.1)
      - beta: Beta release (1.0.0-beta.1)
      - rc: Release candidate (1.0.0-rc.1)
    required: false
    type: choice
    options:
      - none
      - alpha
      - beta
      - rc
    default: 'none'
  draft:
    description: |
      Create as draft release (passed to softprops/action-gh-release).
      - 'true': Release will be created as draft (not published)
      - 'false': Release will be published immediately
    required: false
    default: 'false'
  package-manager:
    description: |
      Package manager to use for setting up Python environment before release.
      Determines which python-setup action to use.
      - pip: Standard pip with pyproject.toml
      - uv: UV package manager (faster, modern)
      - pixi: Pixi package manager (conda-based)
    required: false
    type: choice
    options:
      - pip
      - uv
      - pixi
    default: 'uv'
  package-manager-version:
    description: |
      Version of the package manager (uv or pixi) to install, forwarded to the
      selected python-setup action's `version` input.
      - uv: a version like '0.5.0', or 'latest' for the newest release.
      - pixi: a release tag like 'v0.65.0', or 'latest' for the newest release.
      Match the format to the selected package-manager (uv: bare number; pixi:
      leading 'v'); switching managers may require reformatting this value.
      Ignored when package-manager is 'pip' (pip ships with Python).
      Default is 'latest'.
    required: false
    default: 'latest'
  python-version:
    description: |
      Python version to install (passed to actions/setup-python).
      Supports semantic versioning and version ranges.
      Examples: '3.12', '3.11', '3.10', '3.9', '3.12.0', '3.x'
    required: false
    default: '3.12'
  install-groups:
    description: |
      Dependency groups or environments to install.
      Format varies by package-manager:

      For pip/uv (passed to install-groups):
        - "groups: dev test" - Install dependency groups (PEP 735)
        - "extras: aws viz" - Install optional dependencies (extras)
        - "groups: dev docs, extras: aws" - Combine both
        - "" - Install only core dependencies

      For pixi (passed to environments and activate-environment):
        - "default" - Use default environment
        - "py311" - Single named environment
        - "py312 py313" - Multiple environments (space-separated)

      Note: When using pixi, specify only one environment name as it's used for both
      environments and activate-environment parameters.

      Required: there is no default, so every caller must pass this explicitly
      (pip/uv: a "groups:"/"extras:" string; pixi: a single environment name).
    required: true
  config-file:
    description: |
      Path to a commitizen configuration file (pyproject.toml).
      Useful in monorepos where each package has its own commitizen config.
      When set, commitizen is invoked as: cz --config {config-file}
      Example: 'libs/providers/ollama/pyproject.toml'
      Leave empty (default) to use the root pyproject.toml.
    required: false
    default: ''

  skip-github-release:
    description: |
      Skip creating the GitHub release via API. FOR TESTING ONLY.
      When 'true', the action bumps the version and pushes tags but does NOT
      call the GitHub Releases API. This prevents test runs from creating real
      releases in the repository. Unlike the fake git remote (which intercepts
      git push), the GitHub Releases API is called directly with GITHUB_TOKEN
      and cannot be redirected.
      - 'false': Create GitHub release (default, use this in production)
      - 'true': Skip GitHub release creation (testing only)
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Check prerequisites for release
      shell: bash
      run: |
        echo "::group::Checking release prerequisites"
        echo "=== Validating release requirements ==="

        # Check if there are any existing tags
        echo ""
        echo "Checking for existing tags..."
        EXISTING_TAGS=$(git tag -l)
        if [ -z "$EXISTING_TAGS" ]; then
          echo "::warning::No existing tags found in repository"
          echo "::warning::This appears to be the first release"
          echo "::warning::Full changelog will be generated instead of incremental"
        else
          echo "✓ Found existing tags:"
          echo "$EXISTING_TAGS" | head -5
          if [ $(echo "$EXISTING_TAGS" | wc -l) -gt 5 ]; then
            echo "  ... and $(($(echo "$EXISTING_TAGS" | wc -l) - 5)) more"
          fi
        fi

        echo ""
        echo "✓ Prerequisites check completed"
        echo "Note: Changelog file will be validated after Python environment setup"
        echo "========================================"
        echo "::endgroup::"

    - name: Display release configuration
      shell: bash
      env:
        PACKAGE_MANAGER: ${{ inputs.package-manager }}
        PACKAGE_MANAGER_VERSION: ${{ inputs.package-manager-version }}
        PYTHON_VERSION: ${{ inputs.python-version }}
        INCREMENT: ${{ inputs.increment }}
        PRERELEASE_TYPE: ${{ inputs.prerelease-type }}
        DRAFT: ${{ inputs.draft }}
        INSTALL_GROUPS: ${{ inputs.install-groups }}
      run: |
        echo "::group::Release Configuration"
        echo "=== GitHub Release Action Configuration ==="
        echo "✓ Package manager: $PACKAGE_MANAGER"
        if [ "$PACKAGE_MANAGER" != "pip" ]; then
          echo "✓ Package manager version: $PACKAGE_MANAGER_VERSION"
        fi
        echo "✓ Python version: $PYTHON_VERSION"
        echo "✓ Version increment: $INCREMENT"
        if [ "$PRERELEASE_TYPE" != "none" ]; then
          echo "✓ Prerelease type: $PRERELEASE_TYPE"
        else
          echo "✗ Prerelease type: none (standard release)"
        fi
        if [ "$DRAFT" = "true" ]; then
          echo "✓ Draft release: Yes"
        else
          echo "✗ Draft release: No (will be published)"
        fi
        if [ -n "$INSTALL_GROUPS" ]; then
          echo "✓ Install groups: $INSTALL_GROUPS"
        else
          echo "✗ Install groups: none (core dependencies only)"
        fi
        echo "========================================"
        echo "::endgroup::"


    - name: Set up Python environment (pip)
      if: ${{ inputs.package-manager == 'pip' }}
      uses: serapeum-org/github-actions/actions/python-setup/pip@pip/v1.1.0
      with:
        python-version: ${{ inputs.python-version }}
        install-groups: ${{ inputs.install-groups }}

    - name: Set up Python environment (uv)
      if: ${{ inputs.package-manager == 'uv' }}
      uses: serapeum-org/github-actions/actions/python-setup/uv@uv/v1.2.0
      with:
        python-version: ${{ inputs.python-version }}
        install-groups: ${{ inputs.install-groups }}
        version: ${{ inputs.package-manager-version }}

    - name: Set up Python environment (pixi)
      if: ${{ inputs.package-manager == 'pixi' }}
      uses: serapeum-org/github-actions/actions/python-setup/pixi@pixi/v1.2.0
      with:
        environments: ${{ inputs.install-groups }}
        activate-environment: ${{ inputs.install-groups }}
        version: ${{ inputs.package-manager-version }}

    - name: Configure Git
      shell: bash
      env:
        GIT_ACTOR: ${{ github.actor }}
      run: |
        echo "::group::Configuring Git for version bump"
        echo "Setting git user configuration..."
        git config --global user.name "$GIT_ACTOR"
        git config --global user.email "${GIT_ACTOR}@users.noreply.github.com"
        echo "✓ Git configured with user: $GIT_ACTOR"
        echo "::endgroup::"

    - name: Validate changelog file
      shell: bash
      env:
        CONFIG_FILE: ${{ inputs.config-file }}
      run: |
        echo "::group::Validating changelog file"

        # Determine and enter working directory
        if [ -n "$CONFIG_FILE" ]; then
          WORK_DIR=$(dirname "$CONFIG_FILE")
        else
          WORK_DIR="."
        fi
        echo "Working directory: $WORK_DIR"
        cd "$WORK_DIR"

        # Read changelog_file directly from commitizen config in pyproject.toml
        echo "Retrieving changelog file path from commitizen configuration..."

        CHANGELOG_FILE=""
        if [ -f "pyproject.toml" ]; then
          # Read changelog_file from the [tool.commitizen] section, section-aware:
          # scan from the header to the next "[...]" table so the key is found no
          # matter how far below the header it sits (e.g. after a long version_files
          # array). Tolerates a trailing comment on the header and accepts a double-
          # or single-quoted value, anchoring extraction to the value's own opening
          # quote so an inline "# comment" (even one containing quotes) is ignored.
          # Empty result falls back to CHANGELOG.md below. `q` carries a literal
          # single quote so the awk program needs no embedded single quote. Assumes
          # the ordinary commitizen layout: scalar keys, no multi-line string or
          # nested-array key that starts a line with "[" ahead of changelog_file.
          CHANGELOG_FILE=$(awk -v q="'" '
            /^[[:space:]]*\[tool\.commitizen\][[:space:]]*(#.*)?$/ { inblock = 1; next }
            inblock && /^[[:space:]]*\[/ { exit }
            inblock && /^[[:space:]]*changelog_file[[:space:]]*=/ {
              rhs = $0
              sub(/^[^=]*=[[:space:]]*/, "", rhs)   # rhs now starts at the value
              qc = substr(rhs, 1, 1)                 # opening quote char of the value
              if (qc == "\"" || qc == q) {           # anchor to the value quote, not any quote in a comment
                rest = substr(rhs, 2); p = index(rest, qc)
                if (p > 0) { print substr(rest, 1, p - 1); exit }
              }
              exit
            }
          ' pyproject.toml || true)
        fi

        # Default to CHANGELOG.md if not found
        if [ -z "$CHANGELOG_FILE" ]; then
          CHANGELOG_FILE="CHANGELOG.md"
        fi

        echo "Changelog file: $CHANGELOG_FILE"

        # Check if changelog file exists
        if [ ! -f "$CHANGELOG_FILE" ]; then
          echo "::error::Changelog file not found: $CHANGELOG_FILE"
          echo "::error::A changelog file is required for release generation"
          echo "::error::Please create $CHANGELOG_FILE or run 'cz changelog' from $WORK_DIR"
          echo ""
          echo "To create the file:"
          echo "  cat > $CHANGELOG_FILE << 'EOF'"
          echo "  # Changelog"
          echo "  "
          echo "  All notable changes to this project will be documented in this file."
          echo "  EOF"
          exit 1
        else
          echo "✓ Changelog file exists: $CHANGELOG_FILE"
        fi

        echo "::endgroup::"

    - name: Generate changelog and bump version with commitizen
      id: bump_version
      shell: bash
      env:
        PACKAGE_MANAGER: ${{ inputs.package-manager }}
        INSTALL_GROUPS: ${{ inputs.install-groups }}
        CONFIG_FILE: ${{ inputs.config-file }}
        INCREMENT: ${{ inputs.increment }}
        PRERELEASE_TYPE: ${{ inputs.prerelease-type }}
      run: |
        echo "::group::Preparing commitizen command"

        # Build the commitizen command as an argv array based on package manager
        if [ "$PACKAGE_MANAGER" = "pip" ]; then
          CZ_CMD=(cz)
        elif [ "$PACKAGE_MANAGER" = "pixi" ]; then
          CZ_CMD=(pixi run -e "$INSTALL_GROUPS" cz)
        else
          CZ_CMD=("$PACKAGE_MANAGER" run cz)
        fi
        echo "Using $PACKAGE_MANAGER package manager"
        echo "✓ Commitizen command: ${CZ_CMD[*]}"
        echo "::endgroup::"

        # Preflight: commitizen must be available. install-groups is required (no
        # default); if it was omitted or names a group that does not provide
        # commitizen, fail here with a clear message instead of a downstream
        # "cz: not found" / "pixi run -e ''" error.
        echo "::group::Checking commitizen availability"
        if ! "${CZ_CMD[@]}" version >/dev/null 2>&1; then
          echo "::error::commitizen (cz) is not available. Pass 'install-groups' including the dependency group that provides commitizen (e.g. 'groups: dev'), or ensure commitizen is a core dependency."
          exit 1
        fi
        echo "✓ commitizen is available"
        echo "::endgroup::"

        # Determine and enter working directory
        if [ -n "$CONFIG_FILE" ]; then
          WORK_DIR=$(dirname "$CONFIG_FILE")
        else
          WORK_DIR="."
        fi
        echo "Working directory: $WORK_DIR"
        cd "$WORK_DIR"

        # Read changelog_file from commitizen config (needed for recovery path)
        CHANGELOG_FILE=""
        if [ -f "pyproject.toml" ]; then
          # Read changelog_file from the [tool.commitizen] section, section-aware:
          # scan from the header to the next "[...]" table so the key is found no
          # matter how far below the header it sits (e.g. after a long version_files
          # array). Tolerates a trailing comment on the header and accepts a double-
          # or single-quoted value, anchoring extraction to the value's own opening
          # quote so an inline "# comment" (even one containing quotes) is ignored.
          # Empty result falls back to CHANGELOG.md below. `q` carries a literal
          # single quote so the awk program needs no embedded single quote. Assumes
          # the ordinary commitizen layout: scalar keys, no multi-line string or
          # nested-array key that starts a line with "[" ahead of changelog_file.
          CHANGELOG_FILE=$(awk -v q="'" '
            /^[[:space:]]*\[tool\.commitizen\][[:space:]]*(#.*)?$/ { inblock = 1; next }
            inblock && /^[[:space:]]*\[/ { exit }
            inblock && /^[[:space:]]*changelog_file[[:space:]]*=/ {
              rhs = $0
              sub(/^[^=]*=[[:space:]]*/, "", rhs)   # rhs now starts at the value
              qc = substr(rhs, 1, 1)                 # opening quote char of the value
              if (qc == "\"" || qc == q) {           # anchor to the value quote, not any quote in a comment
                rest = substr(rhs, 2); p = index(rest, qc)
                if (p > 0) { print substr(rest, 1, p - 1); exit }
              }
              exit
            }
          ' pyproject.toml || true)
        fi
        if [ -z "$CHANGELOG_FILE" ]; then
          CHANGELOG_FILE="CHANGELOG.md"
        fi

        echo "::group::Getting current version"
        CURRENT_VERSION=$("${CZ_CMD[@]}" version --project)
        echo "✓ Current version: $CURRENT_VERSION"
        echo "::endgroup::"

        # First-release handling: when no tags exist and
        # update_changelog_on_bump=true, cz bump (even with --dry-run)
        # exits 16 with "No tag found to do an incremental changelog".
        # Toggle the setting off, generate the full changelog manually
        # later, then restore the setting at the end of this step.
        IS_FIRST_RELEASE=false
        FIRST_RELEASE_TOGGLED_CL=false
        if [ -z "$(git tag -l)" ]; then
          IS_FIRST_RELEASE=true
          echo "::notice::First release detected (no existing tags)"
          if grep -qE '^update_changelog_on_bump\s*=\s*true' pyproject.toml; then
            sed -i -E 's/^update_changelog_on_bump\s*=\s*true/update_changelog_on_bump = false/' pyproject.toml
            FIRST_RELEASE_TOGGLED_CL=true
          fi
        fi

        echo "::group::Calculating next version"
        echo "Increment type: $INCREMENT"
        if [ "$PRERELEASE_TYPE" != "none" ]; then
          echo "Prerelease type: $PRERELEASE_TYPE"
          echo "Running dry-run to calculate version..."
          NEXT_VERSION=$("${CZ_CMD[@]}" bump --dry-run --yes --increment "$INCREMENT" --prerelease "$PRERELEASE_TYPE" | grep "tag to create" | awk '{print $NF}')
        else
          echo "Prerelease type: none (standard release)"
          echo "Running dry-run to calculate version..."
          NEXT_VERSION=$("${CZ_CMD[@]}" bump --dry-run --yes --increment "$INCREMENT" | grep "tag to create" | awk '{print $NF}')
        fi
        echo "✓ Next version will be: $NEXT_VERSION"
        echo "  Version change: $CURRENT_VERSION → $NEXT_VERSION"
        echo "::endgroup::"

        # On first release, generate the changelog manually (cz bump will skip
        # it because we toggled update_changelog_on_bump off) and stage it so
        # cz bump includes it in the version-bump commit.
        if [ "$IS_FIRST_RELEASE" = "true" ]; then
          echo "::group::Generating initial changelog"
          "${CZ_CMD[@]}" changelog --unreleased-version="$NEXT_VERSION"
          git add "$CHANGELOG_FILE"
          echo "✓ Initial changelog generated and staged"
          echo "::endgroup::"
        fi

        echo "::group::Bumping version and generating changelog"
        echo "Running cz bump (handles both version and changelog)..."

        # Run cz bump - it handles changelog generation automatically
        # If it fails, we'll recover by generating full changelog and retrying
        set +e  # Don't exit on error
        if [ "$PRERELEASE_TYPE" != "none" ]; then
          "${CZ_CMD[@]}" bump --yes --increment "$INCREMENT" --prerelease "$PRERELEASE_TYPE"
          BUMP_EXIT_CODE=$?
        else
          "${CZ_CMD[@]}" bump --yes --increment "$INCREMENT"
          BUMP_EXIT_CODE=$?
        fi
        set -e  # Re-enable exit on error

        # If bump failed, recover by generating full changelog and retrying with --files-only
        if [ $BUMP_EXIT_CODE -ne 0 ]; then
          echo "⚠ cz bump encountered an issue (exit code: $BUMP_EXIT_CODE)"
          echo "Recovering: resetting changelog and regenerating..."

          # Reset changelog to pre-bump state to avoid duplicate entries
          git checkout -- "$CHANGELOG_FILE"

          # Generate full changelog
          "${CZ_CMD[@]}" changelog --unreleased-version="$NEXT_VERSION"

          # cz bump --files-only still triggers an incremental changelog update when
          # update_changelog_on_bump = true, and that update fails with exit 16
          # because we just regenerated the changelog in full above (the pre-existing
          # unreleased section confuses cz's incremental logic).
          # Toggle the setting off for the retry and restore it afterwards.
          TOGGLED_CL=false
          if grep -qE '^update_changelog_on_bump\s*=\s*true' pyproject.toml; then
            sed -i -E 's/^update_changelog_on_bump\s*=\s*true/update_changelog_on_bump = false/' pyproject.toml
            TOGGLED_CL=true
          fi

          # Retry bump with --files-only (skip changelog since we just generated it)
          if [ "$PRERELEASE_TYPE" != "none" ]; then
            "${CZ_CMD[@]}" bump --yes --increment "$INCREMENT" --prerelease "$PRERELEASE_TYPE" --files-only
          else
            "${CZ_CMD[@]}" bump --yes --increment "$INCREMENT" --files-only
          fi

          if [ "$TOGGLED_CL" = "true" ]; then
            sed -i -E 's/^update_changelog_on_bump\s*=\s*false/update_changelog_on_bump = true/' pyproject.toml
          fi
          echo "✓ Recovery successful"
        fi

        # Restore the first-release toggle if we set it earlier.
        if [ "$FIRST_RELEASE_TOGGLED_CL" = "true" ]; then
          sed -i -E 's/^update_changelog_on_bump\s*=\s*false/update_changelog_on_bump = true/' pyproject.toml
        fi

        echo "✓ Version bump and changelog generation completed"
        echo "::endgroup::"

        echo "::group::Verifying version bump"
        # NEXT_VERSION comes from the dry-run and already contains the full tag
        # as produced by tag_format (e.g. "serapeum-ollama-0.2.0" or "0.2.0").
        # Using it here ensures the release step references the tag commitizen created.
        NEW_VERSION=$NEXT_VERSION
        echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "CHANGELOG_FILE=$CHANGELOG_FILE" >> $GITHUB_OUTPUT
        echo "WORK_DIR=$WORK_DIR" >> $GITHUB_OUTPUT

        if git rev-parse "$NEW_VERSION" >/dev/null 2>&1; then
          echo "✓ Tag verified in git: $NEW_VERSION"
        else
          echo "::warning::Tag not found in git: $NEW_VERSION"
        fi

        echo ""
        echo "=== Version Bump Summary ==="
        echo "Previous version: $CURRENT_VERSION"
        echo "New version: $NEW_VERSION"
        echo "Increment type: $INCREMENT"
        if [ "$PRERELEASE_TYPE" != "none" ]; then
          echo "Prerelease: $PRERELEASE_TYPE"
        fi
        echo "=========================="
        echo "::endgroup::"

    - name: Fold refreshed lockfile into the version-bump commit
      if: ${{ inputs.package-manager == 'uv' || inputs.package-manager == 'pixi' }}
      shell: bash
      env:
        PACKAGE_MANAGER: ${{ inputs.package-manager }}
        NEW_VERSION: ${{ steps.bump_version.outputs.NEW_VERSION }}
      run: |
        echo "::group::Folding refreshed lockfile into the version-bump commit"

        # Workspaces keep the lockfile at the repo root even when the release
        # action's WORK_DIR is a sub-package. Always operate at the repo root.
        REPO_ROOT=$(git rev-parse --show-toplevel)
        cd "$REPO_ROOT"

        # Safety gate: only fold when HEAD is the commit the new tag points to.
        # If the bump step's recovery path ran (cz bump --files-only, which does
        # not commit or tag) or anything else left HEAD off the bump commit,
        # amending here would rewrite the wrong commit.
        HEAD_SHA=$(git rev-parse HEAD)
        TAG_SHA=$(git rev-parse "$NEW_VERSION^{commit}" 2>/dev/null || true)
        if [ -z "$TAG_SHA" ]; then
          echo "::warning::No commit resolves for tag $NEW_VERSION; skipping lockfile fold"
          echo "::endgroup::"
          exit 0
        fi
        if [ "$HEAD_SHA" != "$TAG_SHA" ]; then
          echo "::warning::HEAD ($HEAD_SHA) is not the tagged commit ($TAG_SHA); skipping lockfile fold"
          echo "::endgroup::"
          exit 0
        fi

        # Pick the lockfile + command for the active package manager.
        case "$PACKAGE_MANAGER" in
          uv)   LOCK_FILE="uv.lock"   ; LOCK_CMD="uv lock"   ;;
          pixi) LOCK_FILE="pixi.lock" ; LOCK_CMD="pixi lock" ;;
        esac

        if [ ! -f "$LOCK_FILE" ]; then
          echo "No $LOCK_FILE at repo root; nothing to fold."
          echo "::endgroup::"
          exit 0
        fi

        echo "Refreshing $LOCK_FILE via '$LOCK_CMD'..."
        if ! $LOCK_CMD; then
          echo "::error::'$LOCK_CMD' failed; refusing to push a release with a stale $LOCK_FILE"
          exit 1
        fi

        if git diff --quiet -- "$LOCK_FILE"; then
          echo "$LOCK_FILE unchanged after bump; nothing to fold."
          echo "::endgroup::"
          exit 0
        fi

        echo "$LOCK_FILE changed; folding into the bump commit and re-pointing the tag."
        git add -- "$LOCK_FILE"
        git commit --amend --no-edit --no-verify
        git tag -f "$NEW_VERSION"

        NEW_HEAD_SHA=$(git rev-parse HEAD)
        NEW_TAG_SHA=$(git rev-parse "$NEW_VERSION^{commit}")
        if [ "$NEW_HEAD_SHA" != "$NEW_TAG_SHA" ]; then
          echo "::error::Post-amend sanity check failed: tag $NEW_VERSION does not point at HEAD"
          exit 1
        fi

        echo "✓ $LOCK_FILE folded into the release commit"
        echo "✓ Tag $NEW_VERSION re-pointed to $NEW_HEAD_SHA"
        echo "::endgroup::"

    - name: Push changes and tags
      shell: bash
      env:
        NEW_VERSION: ${{ steps.bump_version.outputs.NEW_VERSION }}
      run: |
        echo "::group::Pushing changes and tags to repository"

        echo "Pushing version bump commit..."
        if ! git push; then
          echo "::error::Failed to push changes to repository"
          exit 1
        fi
        echo "✓ Changes pushed successfully"

        echo ""
        echo "Pushing tags to repository..."
        if ! git push --tags; then
          echo "::error::Failed to push tags to repository"
          exit 1
        fi
        echo "✓ Tags pushed successfully"

        echo ""
        echo "=== Git Push Summary ==="
        echo "✓ Version bump committed and pushed"
        echo "✓ Git tag created and pushed"
        echo "  Tag: $NEW_VERSION"
        echo "======================="
        echo "::endgroup::"

    - name: Create GitHub Release
      shell: bash
      env:
        NEW_VERSION: ${{ steps.bump_version.outputs.NEW_VERSION }}
        DRAFT: ${{ inputs.draft }}
      run: |
        echo "::group::Creating GitHub Release"
        echo "Release details:"
        echo "  Version: $NEW_VERSION"
        echo "  Tag: $NEW_VERSION"
        if [ "$DRAFT" = "true" ]; then
          echo "  Type: Draft release"
        else
          echo "  Type: Published release"
        fi

        # Check if this is a prerelease
        VERSION="$NEW_VERSION"
        if [[ "$VERSION" == *"-"* ]] || [[ "$VERSION" == *"alpha"* ]] || [[ "$VERSION" == *"beta"* ]] || [[ "$VERSION" == *"rc"* ]]; then
          echo "  Prerelease: Yes"
        else
          echo "  Prerelease: No"
        fi
        echo "::endgroup::"

    - name: Extract release notes from changelog
      id: release_notes
      shell: bash
      env:
        NEW_VERSION: ${{ steps.bump_version.outputs.NEW_VERSION }}
        CHANGELOG_FILE: ${{ steps.bump_version.outputs.CHANGELOG_FILE }}
        WORK_DIR: ${{ steps.bump_version.outputs.WORK_DIR }}
      run: |
        echo "::group::Extracting release notes from changelog"
        VERSION="$NEW_VERSION"
        cd "$WORK_DIR"

        echo "Extracting notes for version $VERSION from $CHANGELOG_FILE"

        # Escape dots in version for safe regex matching (0.3.0 -> 0\.3\.0)
        ESCAPED_VERSION=$(echo "$VERSION" | sed 's/\./\\./g')

        # Extract the section between this version's heading and the next version heading.
        # Commitizen changelog format: ## <version> (date)
        BODY=$(awk "
          /^## .*${ESCAPED_VERSION}/ { found=1; next }
          found && /^## / { exit }
          found { print }
        " "$CHANGELOG_FILE")

        if [ -z "$BODY" ]; then
          echo "::warning::Could not extract release notes for $VERSION, using full changelog section"
          BODY="Release $VERSION"
        fi

        echo "Release notes extracted:"
        echo "$BODY"

        # Use heredoc delimiter for multi-line output
        echo "body<<RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
        echo "$BODY" >> $GITHUB_OUTPUT
        echo "RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
        echo "::endgroup::"

    - name: Publish GitHub Release
      if: ${{ inputs.skip-github-release != 'true' }}
      uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
      with:
        token: ${{ inputs.github-token }}
        name: ${{ steps.bump_version.outputs.NEW_VERSION }}
        tag_name: ${{ steps.bump_version.outputs.NEW_VERSION }}
        body: ${{ steps.release_notes.outputs.body }}
        draft: ${{ inputs.draft == 'true' }}
        prerelease: ${{ contains(steps.bump_version.outputs.NEW_VERSION, 'alpha') || contains(steps.bump_version.outputs.NEW_VERSION, 'beta') || contains(steps.bump_version.outputs.NEW_VERSION, 'rc') }}

    - name: Release summary
      shell: bash
      env:
        INCREMENT: ${{ inputs.increment }}
        PRERELEASE_TYPE: ${{ inputs.prerelease-type }}
        DRAFT: ${{ inputs.draft }}
        NEW_VERSION: ${{ steps.bump_version.outputs.NEW_VERSION }}
        SERVER_URL: ${{ github.server_url }}
        REPOSITORY: ${{ github.repository }}
      run: |
        echo "::group::Release Summary"
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "        GitHub Release Created"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo ""
        echo "✓ Version: $NEW_VERSION"
        echo "✓ Increment: $INCREMENT"
        if [ "$PRERELEASE_TYPE" != "none" ]; then
          echo "✓ Prerelease: $PRERELEASE_TYPE"
        fi
        if [ "$DRAFT" = "true" ]; then
          echo "✓ Status: Draft (not published)"
        else
          echo "✓ Status: Published"
        fi
        echo ""
        echo "View release: ${SERVER_URL}/${REPOSITORY}/releases/tag/${NEW_VERSION}"
        echo ""
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "::endgroup::"
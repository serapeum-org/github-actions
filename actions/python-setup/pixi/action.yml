name: 'Setup Python with pixi'
description: 'Setup Python environment with pixi package manager and install dependencies'

inputs:
  environments:
    description: >
      Pixi environments to install. Space-separated list of environment names
      defined in pixi.toml/pyproject.toml.
      Examples: "default", "py311", "py312 py313", "test docs".
      Default is "default".
    required: false
    default: 'default'
  activate-environment:
    description: >
      Environment to activate after installation. Must be one of the environments
      listed in the 'environments' input.
      Examples: "default", "py311", "test".
      Default is "default".
    required: false
    default: 'default'
  cache:
    description: >
      Whether to enable caching of pixi environments. Set to "true" to cache
      environments between runs (cache key is based on pixi.lock hash).
      Cache writes only happen on pushes to main.
      Examples: "true", "false".
      Default is "false".
    required: false
    default: 'false'
  verify-lock:
    description: >
      Whether to verify the lock file is up to date (uses --locked mode).
      When "true", fails if pixi.lock is out of sync with pixi.toml/pyproject.toml.
      When "false", uses --frozen mode (installs exactly what is in the lock file
      without checking).
      Examples: "true", "false".
      Default is "true".
    required: false
    default: 'true'
  version:
    description: >
      Version of pixi to install (passed to prefix-dev/setup-pixi as pixi-version).
      Use a release tag such as "v0.65.0" to pin, or "latest" for the newest release.
      Default is "latest".
    required: false
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - name: Validate lock file exists
      shell: bash
      run: |
        if [ ! -f "pixi.lock" ]; then
          echo "::error::❌ pixi.lock file does not exist!"
          echo "::error::To fix this issue:"
          echo "::error:: Run 'pixi install' locally to generate pixi.lock and commit it to your repository"
          echo "::error::This action requires a committed lock file and will never generate it in CI."
          exit 1
        fi
        echo "✓ Lock file exists"

    - name: Setup pixi (with cache)
      if: inputs.cache == 'true'
      uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      with:
        environments: ${{ inputs.environments }}
        activate-environment: ${{ inputs.activate-environment }}
        pixi-version: ${{ inputs.version }}
        cache: true
        cache-key: pixi-${{ hashFiles('pixi.lock') }}
        cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
        locked: ${{ inputs.verify-lock == 'true' }}
        frozen: ${{ inputs.verify-lock != 'true' }}

    - name: Setup pixi (without cache)
      if: inputs.cache != 'true'
      uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      with:
        environments: ${{ inputs.environments }}
        activate-environment: ${{ inputs.activate-environment }}
        pixi-version: ${{ inputs.version }}
        cache: false
        locked: ${{ inputs.verify-lock == 'true' }}
        frozen: ${{ inputs.verify-lock != 'true' }}

    - name: List environment info
      shell: bash
      env:
        ACTIVATE_ENV: ${{ inputs.activate-environment }}
      run: |
        echo "::group::Pixi environment information"
        echo "Active environment: $ACTIVATE_ENV"
        echo "Available environments:"
        pixi info
        echo "::endgroup::"

    - name: List installed packages
      shell: bash
      env:
        ACTIVATE_ENV: ${{ inputs.activate-environment }}
      run: |
        echo "::group::Installed packages summary"
        pixi list -e "$ACTIVATE_ENV"
        echo "::endgroup::"
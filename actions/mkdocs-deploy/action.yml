name: 'Deploy MkDocs'
description: 'Deploy MkDocs documentation to GitHub Pages with versioning support'

inputs:
  trigger:
    description: >
      Deployment trigger type that determines which mike version to deploy.
      - "pull_request": Deploys to "develop" version (for PR previews).
      - "main": Deploys to "main" version and sets it as the default.
      - "release": Deploys to the tagged version with an alias (e.g., "latest").
      Examples: "pull_request", "main", "release".
    required: true
  package-manager:
    description: >
      Package manager to use for setting up the Python environment.
      Determines which python-setup action is used and how mike commands are run.
      For pip, mike runs directly; for uv/pixi, commands are prefixed with "run".
      Examples: "pip", "uv", "pixi".
      Default is "uv".
    required: false
    default: 'uv'
  package-manager-version:
    description: >
      Version of the package manager (uv or pixi) to install, forwarded to the
      selected python-setup action's version input. For uv use a value like
      "0.5.0" or "latest"; for pixi use a release tag like "v0.65.0" or "latest".
      Match the format to the selected package-manager (uv: bare number; pixi:
      leading "v"); switching managers may require reformatting this value.
      Ignored for pip.
      Default is "latest".
    required: false
    default: 'latest'
  python-version:
    description: >
      Python version to install (passed to the selected python-setup action).
      Examples: "3.12", "3.11", "3.10", "3.x".
      Default is "3.12".
    required: false
    default: '3.12'
  install-groups:
    description: >
      Dependency groups or environment to install.
      Format varies by package-manager:
        For pip/uv: use "groups:" and/or "extras:" prefixed format.
        For pixi: pass a single environment name directly.
      Examples: "groups: docs", "extras: docs", "groups: docs dev",
      "docs" (for pixi).
      Default is "groups: docs".
    required: false
    default: 'groups: docs'
  deploy-token:
    description: >
      GitHub token for deployment to GitHub Pages.
      Typically use a personal access token or GITHUB_TOKEN with pages permissions.
      Example: secrets.ACTIONS_DEPLOY_TOKEN.
    required: true
  release-tag:
    description: >
      Release tag version (used only with trigger "release"). When empty,
      falls back to github.event.release.tag_name.
      Examples: "v1.0.0", "v2.1.0", "1.0.0".
      Default is "" (uses the release event tag).
    required: false
    default: ''
  mike-alias:
    description: >
      Mike alias to assign to release versions. Used only with trigger "release"
      to create a friendly alias alongside the version number.
      Examples: "latest", "stable", "current".
      Default is "latest".
    required: false
    default: 'latest'
  notebooks-path:
    description: >
      Root directory containing notebooks to execute and cache before the
      mkdocs build. When set, the action walks this directory recursively for
      "*.ipynb" files, reuses cached executed copies where available, and runs
      "jupyter nbconvert --execute" for any uncached notebook. Cache is keyed
      on notebook contents, "src/**/*.py", and "pyproject.toml", persisted via
      actions/cache. Requires four packages in the dependency group passed via
      install-groups: "jupyter", "nbconvert", and "ipykernel" (preflight-checked
      and used for execution) plus "mkdocs-jupyter" (used later by the mkdocs
      build to render the executed notebooks; missing mkdocs-jupyter passes
      preflight but fails at build time). Assumes src-layout (library code under
      "src/") with "pyproject.toml" at repo root. When empty (default), notebook
      execution is skipped entirely. Use notebooks-exclude to skip individual
      notebooks that cannot run in CI, and notebooks-continue-on-error to keep
      going past an execution failure.
      Examples: "docs/notebook", "docs/notebooks", "examples/notebooks".
      Default is "" (skip).
    required: false
    default: ''
  notebooks-exclude:
    description: >
      Newline- or comma-separated glob patterns identifying notebooks under
      notebooks-path to skip executing. Patterns are matched against each
      notebook's path relative to notebooks-path (POSIX-style, e.g.
      "dask/*.ipynb" or "**/stac-cloud-*.ipynb"). Excluded notebooks are left
      untouched and rendered without fresh execution. Mirrors pytest's
      "--ignore-glob". When empty (default), no notebooks are excluded.
      Examples: "**/lazy-*.ipynb", "dask/*.ipynb, zarr/*.ipynb".
      Default is "" (exclude nothing).
    required: false
    default: ''
  notebooks-continue-on-error:
    description: >
      When "true", a non-excluded notebook that fails to execute is downgraded
      to a warning and the remaining notebooks still run, instead of aborting
      the whole "Prepare notebook outputs" step. The failing notebook is left
      with whatever outputs it had (not cached). When "false" (default), the
      first execution failure fails the step.
      Default is "false".
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:

    - name: Set up Python environment (pip)
      if: ${{ inputs.package-manager == 'pip' }}
      uses: serapeum-org/github-actions/actions/python-setup/pip@pip/v1.1.0
      with:
        python-version: ${{ inputs.python-version }}
        install-groups: ${{ inputs.install-groups }}

    - name: Set up Python environment (uv)
      if: ${{ inputs.package-manager == 'uv' }}
      uses: serapeum-org/github-actions/actions/python-setup/uv@uv/v1.2.0
      with:
        python-version: ${{ inputs.python-version }}
        install-groups: ${{ inputs.install-groups }}
        verify-lock: false
        version: ${{ inputs.package-manager-version }}

    - name: Set up Python environment (pixi)
      if: ${{ inputs.package-manager == 'pixi' }}
      uses: serapeum-org/github-actions/actions/python-setup/pixi@pixi/v1.2.0
      with:
        environments: ${{ inputs.install-groups }}
        activate-environment: ${{ inputs.install-groups }}
        verify-lock: false
        version: ${{ inputs.package-manager-version }}

    - name: Restore notebook execution cache
      if: ${{ inputs.notebooks-path != '' }}
      uses: actions/cache@v6
      with:
        path: .jupyter_cache
        key: jupyter-cache-${{ hashFiles(format('{0}/**/*.ipynb', inputs.notebooks-path), 'src/**/*.py', 'pyproject.toml') }}

    - name: Verify notebook execution dependencies
      if: ${{ inputs.notebooks-path != '' }}
      shell: bash
      env:
        PACKAGE_MANAGER: ${{ inputs.package-manager }}
        INSTALL_GROUPS: ${{ inputs.install-groups }}
      run: |
        echo "::group::Verifying jupyter / nbconvert / ipykernel are installed"
        if [ "$PACKAGE_MANAGER" = "pip" ]; then
          RUN=""
        else
          RUN="$PACKAGE_MANAGER run"
        fi
        if ! $RUN python -c "import jupyter, nbconvert, ipykernel" 2>/dev/null; then
          echo "::error::notebooks-path is set but jupyter/nbconvert/ipykernel are not importable."
          echo "::error::Add them to the dependency group passed via install-groups (currently: '${INSTALL_GROUPS}')."
          exit 1
        fi
        echo "::endgroup::"

    - name: Prepare notebook outputs (execute uncached, merge cached)
      if: ${{ inputs.notebooks-path != '' }}
      shell: bash
      env:
        PACKAGE_MANAGER: ${{ inputs.package-manager }}
        NOTEBOOK_ROOT: ${{ inputs.notebooks-path }}
        NOTEBOOK_EXCLUDE: ${{ inputs.notebooks-exclude }}
        NOTEBOOK_CONTINUE_ON_ERROR: ${{ inputs.notebooks-continue-on-error }}
      run: |
        echo "::group::Preparing notebook outputs"
        SCRIPT="${{ github.action_path }}/scripts/prep_notebooks.py"
        if [ "$PACKAGE_MANAGER" = "pip" ]; then
          python "$SCRIPT"
        else
          $PACKAGE_MANAGER run python "$SCRIPT"
        fi
        echo "::endgroup::"

    - name: Configure Git
      shell: bash
      env:
        GIT_ACTOR: ${{ github.actor }}
      run: |
        echo "::group::Configuring Git"
        git config --global user.name "$GIT_ACTOR"
        git config --global user.email "${GIT_ACTOR}@users.noreply.github.com"
        echo "::endgroup::"

    - name: Set release tag environment variable
      if: ${{ inputs.trigger == 'release' }}
      shell: bash
      env:
        INPUT_RELEASE_TAG: ${{ inputs.release-tag }}
        EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
      run: |
        echo "::group::Setting release tag"
        if [ -n "$INPUT_RELEASE_TAG" ]; then
          RELEASE_TAG_VERSION="$INPUT_RELEASE_TAG"
        else
          RELEASE_TAG_VERSION="$EVENT_RELEASE_TAG"
        fi
        if [ -z "$RELEASE_TAG_VERSION" ]; then
          echo "::error::trigger is 'release' but no release tag could be resolved."
          echo "::error::Provide the 'release-tag' input, or run on a release event so github.event.release.tag_name is set."
          exit 1
        fi
        echo "RELEASE_TAG_VERSION=${RELEASE_TAG_VERSION}" >> "$GITHUB_ENV"
        echo "Release tag: ${RELEASE_TAG_VERSION}"
        echo "::endgroup::"

    - name: Deploy to GitHub Pages (Pull Request)
      if: ${{ inputs.trigger == 'pull_request' }}
      shell: bash
      env:
        ACTIONS_DEPLOY_TOKEN: ${{ inputs.deploy-token }}
        PACKAGE_MANAGER: ${{ inputs.package-manager }}
      run: |
        echo "::group::Deploying pull request documentation"
        if [ "$PACKAGE_MANAGER" = "pip" ]; then
          mike deploy --push develop
        else
          $PACKAGE_MANAGER run mike deploy --push develop
        fi
        echo "::endgroup::"

    - name: Deploy to GitHub Pages (Main)
      if: ${{ inputs.trigger == 'main' }}
      shell: bash
      env:
        ACTIONS_DEPLOY_TOKEN: ${{ inputs.deploy-token }}
        PACKAGE_MANAGER: ${{ inputs.package-manager }}
      run: |
        echo "::group::Deploying main branch documentation"
        if [ "$PACKAGE_MANAGER" = "pip" ]; then
          mike deploy --push main
          mike set-default --push main
        else
          $PACKAGE_MANAGER run mike deploy --push main
          $PACKAGE_MANAGER run mike set-default --push main
        fi
        echo "::endgroup::"

    - name: Deploy to GitHub Pages (Release)
      if: ${{ inputs.trigger == 'release' }}
      shell: bash
      env:
        ACTIONS_DEPLOY_TOKEN: ${{ inputs.deploy-token }}
        PACKAGE_MANAGER: ${{ inputs.package-manager }}
        MIKE_ALIAS: ${{ inputs.mike-alias }}
      run: |
        echo "::group::Deploying release documentation"
        if [ "$PACKAGE_MANAGER" = "pip" ]; then
          mike deploy --push --update-aliases "${RELEASE_TAG_VERSION}" "$MIKE_ALIAS"
          mike set-default --push "$MIKE_ALIAS"
        else
          $PACKAGE_MANAGER run mike deploy --push --update-aliases "${RELEASE_TAG_VERSION}" "$MIKE_ALIAS"
          $PACKAGE_MANAGER run mike set-default --push "$MIKE_ALIAS"
        fi
        echo "::endgroup::"
